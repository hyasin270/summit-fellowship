<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pakistan Collective — Under Maintenance</title>
<meta name="description" content="Pakistan Collective — we'll be back soon.">
<meta property="og:title" content="Pakistan Collective — Under Maintenance">
<meta property="og:description" content="We're making some updates. Back soon.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.pakistancollective.org/">
<link rel="canonical" href="https://www.pakistancollective.org/">
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0E1C2F;
    --navy2: #152843;
    --navy3: #1E3D5C;
    --gold: #C8A558;
    --gold2: #E6C96A;
    --gold3: #F5E09A;
    --green: #2E6B50;
    --green2: #3D8A64;
    --cream: #F8F3EC;
    --cream2: #EFE8DA;
    --white: #FDFAF7;
    --gray: #8C9EAE;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* grain texture overlay */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 300;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 160px 160px;
  }

  /* background gradients */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 68% 25%, rgba(45,106,79,0.2) 0%, transparent 55%),
      radial-gradient(ellipse 40% 35% at 18% 75%, rgba(201,168,76,0.13) 0%, transparent 50%),
      radial-gradient(ellipse 30% 25% at 85% 70%, rgba(26,58,92,0.3) 0%, transparent 50%),
      linear-gradient(170deg, #0a1628 0%, #0c1d35 45%, #0e1c2f 100%);
  }

  /* stars */
  .stars {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    animation: starsFloat 25s ease-in-out infinite;
  }
  @keyframes starsFloat {
    0%, 100% { opacity: 0.9; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-3px); }
  }

  /* mountains */
  .mountains-svg {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1;
    width: 100%; height: 45%;
    animation: mountainFloat 10s ease-in-out infinite;
  }
  @keyframes mountainFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* content */
  .content {
    position: relative; z-index: 2;
    text-align: center;
    padding: 2rem;
    max-width: 640px;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 2rem;
    display: flex; align-items: center; justify-content: center; gap: 1rem;
    animation: fadeSlideIn 0.8s 0.2s both;
  }
  .eyebrow::before, .eyebrow::after {
    content: ''; display: block; width: 40px; height: 1px; background: var(--gold);
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 6vw, 5rem);
    font-weight: 700; line-height: 0.95;
    color: var(--white);
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
    animation: fadeSlideIn 0.9s 0.35s both;
  }
  .title-gold { color: var(--gold); font-style: italic; }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    font-weight: 300; font-style: italic;
    color: rgba(245,240,232,0.75);
    margin: 1.8rem auto 2.5rem;
    max-width: 460px;
    line-height: 1.65;
    animation: fadeSlideIn 0.9s 0.5s both;
  }

  .divider {
    width: 60px; height: 2px; margin: 0 auto 2.5rem;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: fadeSlideIn 0.9s 0.6s both;
  }

  .message {
    font-size: 0.92rem;
    color: var(--gray);
    line-height: 1.8;
    animation: fadeSlideIn 0.9s 0.7s both;
  }

  .message a {
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid rgba(200,165,88,0.3);
    transition: border-color 0.2s;
  }
  .message a:hover { border-color: var(--gold); }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

  /* pulse dot */
  .pulse-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--green2);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(61,138,100,0.5); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(61,138,100,0); }
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- stars -->
<svg class="stars" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <circle cx="120" cy="80" r="1" fill="#C8A558" opacity="0.5"/>
  <circle cx="350" cy="150" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="580" cy="60" r="1.2" fill="#C8A558" opacity="0.4"/>
  <circle cx="780" cy="200" r="0.7" fill="#fff" opacity="0.25"/>
  <circle cx="950" cy="90" r="1" fill="#C8A558" opacity="0.35"/>
  <circle cx="1150" cy="170" r="0.9" fill="#fff" opacity="0.3"/>
  <circle cx="1320" cy="50" r="1.1" fill="#C8A558" opacity="0.45"/>
  <circle cx="250" cy="280" r="0.6" fill="#fff" opacity="0.2"/>
  <circle cx="680" cy="320" r="0.8" fill="#C8A558" opacity="0.3"/>
  <circle cx="1050" cy="300" r="0.7" fill="#fff" opacity="0.25"/>
  <circle cx="450" cy="400" r="1" fill="#C8A558" opacity="0.2"/>
  <circle cx="850" cy="450" r="0.6" fill="#fff" opacity="0.15"/>
</svg>

<!-- mountain silhouette -->
<svg class="mountains-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 400" preserveAspectRatio="none">
  <path d="M0,400 L0,280 Q60,240 120,260 Q200,180 320,220 Q380,140 480,180 Q560,100 640,160 Q720,80 800,140 Q880,60 960,120 Q1040,40 1120,100 Q1200,60 1280,120 Q1360,80 1440,140 L1440,400 Z" fill="rgba(14,28,47,0.4)"/>
  <path d="M0,400 L0,320 Q100,280 200,300 Q300,240 400,280 Q500,200 600,260 Q700,180 800,240 Q900,160 1000,220 Q1100,180 1200,220 Q1300,200 1440,240 L1440,400 Z" fill="rgba(10,22,40,0.5)"/>
  <path d="M0,400 L0,350 Q150,310 300,340 Q450,290 600,330 Q750,280 900,320 Q1050,290 1200,320 Q1350,300 1440,340 L1440,400 Z" fill="rgba(8,18,32,0.6)"/>
</svg>

<div class="content">
  <div class="eyebrow">Pakistan Collective</div>
  <h1 class="title">We'll Be<br><span class="title-gold">Back Soon</span></h1>
  <p class="subtitle">We're working on something new. The site is temporarily offline while we make updates.</p>
  <div class="divider"></div>
  <p class="message">
    <span class="pulse-dot"></span>Maintenance in progress
  </p>
</div>

</body>
</html>
